<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SuiteMate V3 styling</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <img src="../../icons/48.png" alt="" width="40" height="40">
        <div>
          <h1>SuiteMate V3</h1>
          <p>V1 styling foundation</p>
        </div>
      </header>

      <form id="settings">
        <label class="toggle-row" for="enabled">
          <span>
            <strong>NetSuite styling</strong>
            <small>Apply the V1 visual system</small>
          </span>
          <input id="enabled" name="enabled" type="checkbox">
        </label>

        <fieldset>
          <legend>Appearance</legend>
          <label><input type="radio" name="mode" value="light"> Light</label>
          <label><input type="radio" name="mode" value="dark"> Dark</label>
          <label><input type="radio" name="mode" value="system"> System</label>
        </fieldset>

        <label class="toggle-row" for="squareCorners">
          <span>
            <strong>Boxy UI</strong>
            <small>Remove rounded corners</small>
          </span>
          <input id="squareCorners" name="squareCorners" type="checkbox">
        </label>

        <section id="roleTheme" class="theme-card" aria-labelledby="roleThemeTitle">
          <div class="theme-heading">
            <div>
              <strong id="roleThemeTitle">Role colors</strong>
              <small>V1 Main and Secondary theme</small>
            </div>
            <span id="themeState" class="theme-state">Default</span>
          </div>

          <p id="roleContext" class="role-context">Finding the current NetSuite role...</p>

          <div class="color-grid">
            <label class="color-control" for="mainColor">
              <span>Main</span>
              <input id="mainColor" class="role-color" type="color" value="#607799">
              <code id="mainColorValue">#607799</code>
            </label>

            <label class="color-control" for="secondaryColor">
              <span>Secondary</span>
              <input id="secondaryColor" class="role-color" type="color" value="#a2a4a8">
              <code id="secondaryColorValue">#a2a4a8</code>
            </label>
          </div>

          <div class="theme-actions">
            <button id="swapColors" type="button">Swap colors</button>
            <button id="resetColors" type="button">Default colors</button>
          </div>
        </section>

        <div class="actions">
          <button id="reset" type="button">Reset all</button>
          <output id="status" aria-live="polite"></output>
        </div>
      </form>
    </main>

    <script src="../shared/settings.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
