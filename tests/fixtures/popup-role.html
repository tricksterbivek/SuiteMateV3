<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SuiteMate V3 popup role fixture</title>
    <link rel="stylesheet" href="../../src/popup/popup.css">
    <script src="chrome-stub.js"></script>
  </head>
  <body>
    <script>
      window.close = () => {
        document.documentElement.dataset.popupCloseRequested = "true";
      };
      fetch("../../src/popup/popup.html?fixture=3.1.0")
        .then((response) => response.text())
        .then((source) => {
          const popupDocument = new DOMParser().parseFromString(source, "text/html");
          document.body.replaceChildren(popupDocument.querySelector("main"));

          const settingsScript = document.createElement("script");
          settingsScript.src = "../../src/shared/settings.js";
          settingsScript.addEventListener("load", () => {
            const coreScript = document.createElement("script");
            coreScript.src = "../../src/suiteql/core.js";
            coreScript.addEventListener("load", () => {
              const popupScript = document.createElement("script");
              popupScript.src = "../../src/popup/popup.js";
              document.body.append(popupScript);
            });
            document.body.append(coreScript);
          });
          document.body.append(settingsScript);
        });
    </script>
  </body>
</html>
