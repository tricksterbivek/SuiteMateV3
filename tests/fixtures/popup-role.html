<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SuiteMate V3 popup role fixture</title>
    <link rel="stylesheet" href="../../src/popup/popup.css">
    <script src="chrome-stub.js"></script>
  </head>
  <body>
    <script>
      window.close = () => {
        document.documentElement.dataset.popupCloseRequested = "true";
      };
      fetch("../../src/popup/popup.html?fixture=3.4.0")
        .then((response) => response.text())
        .then((source) => {
          const popupDocument = new DOMParser().parseFromString(source, "text/html");
          document.body.replaceChildren(popupDocument.querySelector("main"));

          const sources = [
            "../../src/shared/utilities.js",
            "../../src/shared/browser-utilities.js",
            "../../src/shared/routes.js",
            "../../src/shared/commands.js",
            "../../src/shared/permissions.js",
            "../../src/shared/settings.js",
            "../../src/shared/settings-transfer.js",
            "../../src/suiteql/core.js",
            "../../dist/material-palette.js",
            "../../src/popup/popup.js"
          ];
          sources.reduce((loaded, src) => loaded.then(() => new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = src;
            script.addEventListener("load", resolve, { once: true });
            script.addEventListener("error", reject, { once: true });
            document.body.append(script);
          })), Promise.resolve());
        });
    </script>
  </body>
</html>
